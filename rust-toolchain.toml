[toolchain]
# stable covers all RISC-V targets (C3, C6).
# S3 (Xtensa) requires channel = "esp" — use a subdirectory with its own
# rust-toolchain.toml rather than switching this file.
channel = "stable"
components = ["rustfmt", "clippy"]
targets = [
	"riscv32imc-unknown-none-elf",  # ESP32-C3
	"riscv32imac-unknown-none-elf", # ESP32-C6
]
