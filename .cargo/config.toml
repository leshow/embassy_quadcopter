[target.'cfg(target_arch = "riscv32")']
runner = "espflash flash --monitor --log-format defmt"
# To pin a specific port: runner = "espflash flash --monitor --port /dev/ttyUSB0"
rustflags = [
	"-C",
	"link-arg=-Tdefmt.x",
	"-C",
	"link-arg=-Tlinkall.x",
	"-C",
	"force-frame-pointers",
]

[alias]
# build/flash from workspace root — explicit targets required (no global default)
build-c3 = "build -p embassy_quad --target riscv32imc-unknown-none-elf"
flash-c3 = "run   -p embassy_quad --target riscv32imc-unknown-none-elf"
build-c6 = "build -p embassy_quad --no-default-features --features c6 --target riscv32imac-unknown-none-elf"
flash-c6 = "run   -p embassy_quad --no-default-features --features c6 --target riscv32imac-unknown-none-elf"
erase-flash = "espflash erase-region 0x1000 0x300000"


[env]
DEFMT_LOG = "info"
